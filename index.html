<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MMCC RV Servo</title><link rel="stylesheet" href="style.css"><script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script></head><body>
<header><h1>MMCC RV Climate — Servo</h1><nav><a href="index.html">Dashboard</a><a href="setup.html">Servo Setup</a><a href="diagnostics.html">Diagnostics & LED</a></nav></header><main>
<div class="grid"><div class="card"><h2>Temperature</h2><div class="big"><span id="v_temperature_f">—</span> °F</div></div><div class="card"><h2>Humidity</h2><div class="big"><span id="v_humidity">—</span>%</div></div><div class="card"><h2>Mode</h2><div class="big" id="v_mode_state">—</div></div><div class="card"><h2>Verification</h2><div class="pill" id="v_cooling_verification">—</div></div></div>
<div class="card"><h2>Controls</h2><div class="row"><button class="primary" onclick="publish('command','START_COOLING')">Start Cooling</button><button onclick="publish('command','FAN_ONLY')">Fan Only</button><button onclick="publish('command','HEAT')">Heat</button><button class="badbtn" onclick="publish('command','STOP_SYSTEM')">Stop System</button><button class="warn" onclick="publish('command','CLEAR_WARNING')">Clear Warning</button></div></div>
<div class="card"><h2>Four-hour temperature history</h2><canvas id="history" width="1000" height="260" style="width:100%;background:#0b141c;border-radius:8px"></canvas></div>
<div class="grid"><div class="card"><h3>Status</h3><p id="v_status">—</p><p>Online: <span id="v_online">—</span></p><p>Sensor: <span id="v_sensor_status">—</span></p></div><div class="card"><h3>Network</h3><p>RSSI: <span id="v_wifi_rssi">—</span> dBm</p><p>IP: <span id="v_ip">—</span></p><p>Uptime: <span id="v_uptime_seconds">—</span> sec</p></div></div>
<div class="card"><h2>MQTT connection</h2><div class="grid"><div><label>Host</label><input id="cfg_host"></div><div><label>WebSocket TLS port</label><input id="cfg_port" type="number"></div><div><label>User</label><input id="cfg_user"></div><div><label>Password</label><input id="cfg_pass" type="password"></div><div><label>Base topic</label><input id="cfg_base"></div></div><div class="row" style="margin-top:12px"><button onclick="connectMqtt()">Connect</button><span id="connection" class="pill">Connecting…</span></div></div>
</main><script src="shared.js"></script><script>
function drawHistory(payload){const vals=payload.split(',').map(Number).filter(Number.isFinite),c=document.getElementById('history'),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);if(vals.length<2)return;const mn=Math.min(...vals)-1,mx=Math.max(...vals)+1,p=28;x.strokeStyle='#33495c';x.beginPath();x.moveTo(p,p);x.lineTo(p,c.height-p);x.lineTo(c.width-p,c.height-p);x.stroke();x.strokeStyle='#31b7ff';x.lineWidth=3;x.beginPath();vals.forEach((v,i)=>{const px=p+i*(c.width-2*p)/(vals.length-1),py=c.height-p-(v-mn)*(c.height-2*p)/(mx-mn||1);i?x.lineTo(px,py):x.moveTo(px,py)});x.stroke();x.fillStyle='#9eb0c4';x.fillText(mx.toFixed(1)+'°F',4,p);x.fillText(mn.toFixed(1)+'°F',4,c.height-p)}
</script></body></html>
