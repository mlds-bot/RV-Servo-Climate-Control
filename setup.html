<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Servo Setup</title><link rel="stylesheet" href="style.css"><script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script></head><body>
<header><h1>Servo Setup</h1><nav><a href="index.html">Dashboard</a><a href="setup.html">Servo Setup</a><a href="diagnostics.html">Diagnostics & LED</a></nav></header><main>
<div class="card"><h2>Calibration</h2><p class="muted">Move in small steps and keep the mechanism clear while testing.</p><div class="grid"><div><label>Pulse width (µs)</label><input id="pulse" type="number" min="500" max="2500" value="1050"></div><div><label>Press hold (ms)</label><input id="hold" type="number" value="350"></div><div><label>Between presses (ms)</label><input id="between" type="number" value="900"></div><div><label>Move step delay (ms)</label><input id="stepDelay" type="number" value="8"></div></div><div class="row" style="margin-top:12px"><button onclick="publish('servo/command','MOVE,'+pulse.value)">Move</button><button onclick="publish('servo/command','SAVE_HOME,'+pulse.value)">Save Home</button><button onclick="publish('servo/command','SAVE_PREPRESS,'+pulse.value)">Save Pre-Press</button><button onclick="publish('servo/command','SAVE_PRESS,'+pulse.value)">Save Press</button><button onclick="publish('servo/command',`SET_TIMING,${hold.value},${between.value},${stepDelay.value}`)">Save Timing</button><button onclick="publish('servo/command','DETACH')">Detach</button></div></div>
<div class="grid"><div class="card"><h2>Movement tests</h2><div class="row"><button onclick="publish('servo/command','EXERCISE')">Exercise Servo</button><button onclick="publish('servo/command','STEP,1')">Press Once</button><button onclick="publish('servo/command','STEP,2')">Press Twice</button><button onclick="publish('servo/command','STEP,3')">Press Three Times</button></div></div><div class="card"><h2>Synchronize mode</h2><p class="muted">Visually confirm the thermostat display first.</p><div class="row"><button onclick="publish('servo/command','SYNC,OFF')">Set OFF</button><button onclick="publish('servo/command','SYNC,FAN')">Set FAN</button><button onclick="publish('servo/command','SYNC,COOL')">Set COOL</button><button onclick="publish('servo/command','SYNC,HEAT')">Set HEAT</button></div></div></div>
<div class="card"><h2>Servo state</h2><pre id="v_servo_state">—</pre></div>
<div class="card"><h2>MQTT connection</h2><div class="grid"><div><label>Host</label><input id="cfg_host"></div><div><label>WebSocket TLS port</label><input id="cfg_port" type="number"></div><div><label>User</label><input id="cfg_user"></div><div><label>Password</label><input id="cfg_pass" type="password"></div><div><label>Base topic</label><input id="cfg_base"></div></div><div class="row" style="margin-top:12px"><button onclick="connectMqtt()">Connect</button><span id="connection" class="pill">Connecting…</span></div></div>
</main><script src="shared.js"></script></body></html>
